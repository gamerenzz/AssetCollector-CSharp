name: Build Client and Server

on:
  workflow_dispatch: # 允许手动触发编译

jobs:
  # 任务一：编译客户端 (WPF .NET 4.7)
  build-client:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Client Dependencies
      run: dotnet restore AssetCollector/AssetCollector.csproj

    - name: Build Client
      run: dotnet build AssetCollector/AssetCollector.csproj -c Release --no-restore

    - name: Upload Client Exe
      uses: actions/upload-artifact@v4
      with:
        name: AssetCollector-Client-Windows
        path: AssetCollector/bin/Release/net47/

  # 任务二：编译服务端 (ASP.NET Core .NET 8.0 独立部署版，免装运行库)
  build-server:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Publish Server (Self-Contained)
      # 【关键升级】
      # 增加了 -r win-x64（指定Windows 64位系统）
      # 增加了 --self-contained true（把.NET8运行库直接打包进输出文件夹）
      run: dotnet publish AssetServer/AssetServer.csproj -c Release -r win-x64 --self-contained true -o publish/AssetServer

    - name: Upload Server Files
      uses: actions/upload-artifact@v4
      with:
        name: AssetServer-WebAPI-Release
        path: publish/AssetServer/
