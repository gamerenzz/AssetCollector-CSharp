<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>终端资产管理平台 - 登录</title>
    <!-- 引入 Tailwind CSS 现代主题 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gradient-to-r from-blue-600 to-indigo-900 min-h-screen flex items-center justify-center font-sans">
    <div id="app" class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-800">终端资产管理平台</h1>
            <p class="text-gray-500 mt-2">后台管理主系统登录</p>
        </div>

        <form @submit.prevent="handleLogin" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">管理员用户名</label>
                <input type="text" v-model="username" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" placeholder="admin">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">登录密码</label>
                <input type="password" v-model="password" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500" placeholder="••••••••">
            </div>

            <div v-if="errorMsg" class="text-red-500 text-sm bg-red-50 p-2 rounded text-center">
                {{ errorMsg }}
            </div>

            <button type="submit" :disabled="loading" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50">
                <span v-if="loading">安全校验中...</span>
                <span v-else>立即登录</span>
            </button>
        </form>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const username = ref('');
                const password = ref('');
                const errorMsg = ref('');
                const loading = ref(false);

                const handleLogin = async () => {
                    loading.value = true;
                    errorMsg.value = '';
                    try {
                        const response = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: username.value, password: password.value })
                        });
                        const data = await response.json();
                        if (response.ok) {
                            // 登录成功，将 token 和用户名保存在本地
                            localStorage.setItem('admin_token', data.token);
                            localStorage.setItem('admin_user', data.username);
                            window.location.href = '/index.html'; // 跳转到主页
                        } else {
                            errorMsg.value = data.message || '登录验证失败';
                        }
                    } catch (e) {
                        errorMsg.value = '连接服务端失败，请检查服务是否开启';
                    } finally {
                        loading.value = false;
                    }
                };

                return { username, password, errorMsg, loading, handleLogin };
            }
        }).mount('#app');
    </script>
</body>
</html>
