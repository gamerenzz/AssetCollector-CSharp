name: Build Client and Server

on:
  workflow_dispatch: # 允许手动触发编译

jobs:
  # 任务一：编译客户端 (WPF .NET 4.7)
  build-client:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Client Dependencies
      run: dotnet restore AssetCollector/AssetCollector.csproj

    - name: Build Client
      run: dotnet build AssetCollector/AssetCollector.csproj -c Release --no-restore

    - name: Upload Client Exe
      uses: actions/upload-artifact@v4
      with:
        name: AssetCollector-Client-Windows
        path: AssetCollector/bin/Release/net47/

  # 任务二：编译服务端 (ASP.NET Core .NET 8.0 独立部署版，免装运行库，支持纯内网)
  build-server:
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Create wwwroot Directory
      run: mkdir -p AssetServer/wwwroot

    # 【核心新增】利用 GitHub 极速外网，在云端将网页所需的库下载到本地，实现纯内网离线秒开
    - name: Download Offline Web Assets (Vue & Tailwind)
      shell: bash
      run: |
        curl -L https://unpkg.com/vue@3/dist/vue.global.js -o AssetServer/wwwroot/vue.global.js
        curl -L https://cdn.tailwindcss.com -o AssetServer/wwwroot/tailwind.js

    - name: Publish Server (Self-Contained)
      run: dotnet publish AssetServer/AssetServer.csproj -c Release -r win-x64 --self-contained true -o publish/AssetServer

    - name: Upload Server Files
      uses: actions/upload-artifact@v4
      with:
        name: AssetServer-WebAPI-Release
        path: publish/AssetServer/
